<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* Isso garante que o mapa ocupe 100% da tela */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="mapCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        // Ajusta o canvas ao tamanho da tela automaticamente
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Redesenha caso o usuário redimensione a janela
            if(window.geoData) renderizar(window.geoData);
        }
        window.addEventListener('resize', resize);
        resize();

        // Carrega o seu arquivo GeoJSON (deve estar na mesma pasta ou caminho acessível)
        fetch('bairros.geojson')
            .then(res => res.json())
            .then(data => {
                window.geoData = data;
                renderizar(data);
            });

        function renderizar(data) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Defina aqui os limites geográficos da sua área para o mapa centralizar/escalar
            // Usei valores aproximados baseados nos seus dados (-53.8, -29.7)
            const minLon = -53.85, maxLon = -53.65;
            const minLat = -29.75, maxLat = -29.65;

            data.features.forEach(feat => {
                ctx.beginPath();
                ctx.strokeStyle = '#0f0'; // Verde estilo terminal
                ctx.lineWidth = 1;

                feat.geometry.coordinates.forEach(polygon => {
                    polygon[0].forEach((p, i) => {
                        const x = (p[0] - minLon) / (maxLon - minLon) * canvas.width;
                        const y = (maxLat - p[1]) / (maxLat - minLat) * canvas.height;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                });
                ctx.stroke();
            });
        }
    </script>
</body>
</html>
