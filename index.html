<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="mapa"></canvas>
    <script>
        const canvas = document.getElementById('mapa');
        const ctx = canvas.getContext('2d');

        async function carregarMapa() {
            // AJUSTE: Coloque aqui o nome exato do seu arquivo no repo
            const response = await fetch('bairros.geojson'); 
            const data = await response.json();
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Bounding Box manual para centralizar (Ajuste conforme sua cidade)
            const minX = -53.85, maxX = -53.65, minY = -29.75, maxY = -29.65;

            ctx.strokeStyle = '#00FF00'; // Cor Ghost
            ctx.lineWidth = 1;

            data.features.forEach(feat => {
                const coords = feat.geometry.coordinates;
                ctx.beginPath();
                coords.forEach(poly => {
                    poly[0].forEach((p, i) => {
                        const x = (p[0] - minX) / (maxX - minX) * canvas.width;
                        const y = (maxY - p[1]) / (maxY - minY) * canvas.height;
                        if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    });
                });
                ctx.stroke();
            });
        }
        carregarMapa();
        window.onresize = carregarMapa;
    </script>
</body>
</html>
