<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ghost Maps - Offline</title>

<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>

<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: Arial;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  .popup {
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="map"></div>

<script>
const map = L.map('map').setView([-29.7061, -53.7964], 12);

// fundo (opcional)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// cor baseada nos dados
function getColor(v) {
  return v > 50 ? '#993404' :
         v > 20 ? '#d95f0e' :
         v > 10 ? '#fe9929' :
         v > 5  ? '#fed98e' :
         v > 1  ? '#ffffd4' :
                  '#ffffff';
}

function style(feature) {
  return {
    fillColor: getColor(feature.properties.confirmados),
    weight: 1,
    color: '#aaa',
    fillOpacity: 0.7
  };
}

fetch('bairros.geojson')
  .then(res => res.json())
  .then(data => {

    const layer = L.geoJSON(data, {
      style,
      onEachFeature: (feature, layer) => {
        layer.bindPopup(
          `Bairro: ${feature.properties.bairro}<br>
           <b>${feature.properties.confirmados}</b> casos<br>
           <b>${feature.properties.obitos}</b> óbitos`
        );
      }
    }).addTo(map);

    map.fitBounds(layer.getBounds());
  });
</script>

</body>
</html>
