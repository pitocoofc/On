<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ghost Search OS - Map Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #mapa-container { width: 100vw; height: 100vh; }
        #mapa-container object { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="mapa-container">
        <object id="mapa-obj" data="mapa.svg" type="image/svg+xml"></object>
    </div>

    <script>
        const mapaObj = document.getElementById('mapa-obj');

        // Espera o SVG carregar totalmente antes de tentar interagir
        mapaObj.addEventListener('load', () => {
            const svgDoc = mapaObj.contentDocument; // Acessa o DOM interno do SVG
            
            // Agora você tem controle total como se fosse um HTML comum
            const brasil = svgDoc.getElementById('Brazil');
            if(brasil) {
                brasil.style.fill = '#002200';
                brasil.addEventListener('click', () => {
                    alert("Acessando dados de Santa Maria...");
                });
            }
        });
    </script>
</body>
</html>
