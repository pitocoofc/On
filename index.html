<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ghost Maps - Offline</title>

<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>

<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: Arial;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  .popup {
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="map"></div>

<script>
const map = L.map('map', {
  zoomControl: true,
  preferCanvas: true // 🔥 melhora MUITO performance
});

// 🔥 Função de cor dinâmica
function getColor(casos) {
  return casos > 50 ? "#ff0000" :
         casos > 20 ? "#ff5e00" :
         casos > 10 ? "#ffaa00" :
         casos > 5  ? "#ffee00" :
                      "#00ff9d";
}

// 🔥 Estilo otimizado
function style(feature) {
  return {
    color: "#00ff9d",
    weight: 0.6,
    fillColor: getColor(feature.properties.confirmados || 0),
    fillOpacity: 0.35
  };
}

// 🔥 Interação leve
function onEachFeature(feature, layer) {
  const p = feature.properties;

  layer.bindPopup(`
    <div class="popup">
      <b>${p.bairro || "Desconhecido"}</b><br>
      🦠 Casos: ${p.confirmados || 0}<br>
      ⚰️ Óbitos: ${p.obitos || 0}
    </div>
  `);

  // Hover leve
  layer.on({
    mouseover: (e) => {
      e.target.setStyle({
        weight: 1.5,
        fillOpacity: 0.6
      });
    },
    mouseout: (e) => {
      geojson.resetStyle(e.target);
    }
  });
}

let geojson;

// 🔥 Carregar GeoJSON
fetch('bairros.geojson')
  .then(res => res.json())
  .then(data => {

    geojson = L.geoJSON(data, {
      style,
      onEachFeature,
      renderer: L.canvas()
    }).addTo(map);

    // 🔥 Ajusta automaticamente
    map.fitBounds(geojson.getBounds());

  });
</script>

</body>
</html>
